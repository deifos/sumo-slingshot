<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#000"/>
  <!-- Sumo ring -->
  <circle cx="64" cy="68" r="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
  <!-- Player box (green) -->
  <rect x="30" y="48" width="28" height="28" rx="3" fill="#c2fe0b"/>
  <!-- Opponent box (cyan) -->
  <rect x="70" y="52" width="28" height="28" rx="3" fill="#01ffff"/>
  <!-- Slingshot line -->
  <line x1="44" y1="62" x2="22" y2="42" stroke="#c2fe0b" stroke-width="3" stroke-linecap="round" stroke-dasharray="4 3"/>
  <!-- Impact burst -->
  <circle cx="66" cy="66" r="6" fill="#ff0d1a" opacity="0.6"/>
</svg>
